services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: profilage-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-profilage}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-profilage}
      VALKEY_URL: redis://valkey:6379/0
      VALKEY_EPHEMERAL_URL: redis://valkey-ephemeral:6379/0
      PYTHONUNBUFFERED: "1"
    ports:
      - "127.0.0.1:${API_PORT:-18000}:8000"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      valkey-ephemeral:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: profilage-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-profilage}
      POSTGRES_USER: ${POSTGRES_USER:-profilage}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8-alpine
    container_name: profilage-valkey
    restart: unless-stopped
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  valkey-ephemeral:
    image: valkey/valkey:8-alpine
    container_name: profilage-valkey-ephemeral
    restart: unless-stopped
    command: ["valkey-server", "--save", "", "--appendonly", "no", "--maxmemory", "128mb", "--maxmemory-policy", "volatile-ttl"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default
      - renderer_queue

  renderer-worker:
    build:
      context: .
      dockerfile: Dockerfile.renderer
    container_name: profilage-renderer-worker
    restart: unless-stopped
    environment:
      VALKEY_EPHEMERAL_URL: redis://valkey-ephemeral:6379/0
      PERSON_HEADLESS_ENABLED: ${PERSON_HEADLESS_ENABLED:-false}
      PERSON_HEADLESS_ALLOWED_DOMAINS: ${PERSON_HEADLESS_ALLOWED_DOMAINS:-}
      PERSON_FETCH_TICKET_VERIFY_KEY: ${PERSON_FETCH_TICKET_VERIFY_KEY:-}
      PERSON_HEADLESS_TIMEOUT_SECONDS: ${PERSON_HEADLESS_TIMEOUT_SECONDS:-12}
      PERSON_HEADLESS_MAX_TEXT_CHARS: ${PERSON_HEADLESS_MAX_TEXT_CHARS:-25000}
    shm_size: "256mb"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=128m,mode=1777
      - /home/pwuser:size=32m,mode=0700,uid=1000,gid=1000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os,time,redis; v=redis.from_url(os.environ['VALKEY_EPHEMERAL_URL']).get('person:renderer:health'); assert v and time.time()-float(v)<30\""]
      interval: 15s
      timeout: 5s
      retries: 4
    networks:
      - renderer_queue
      - renderer_egress
    depends_on:
      valkey-ephemeral:
        condition: service_healthy

volumes:
  postgres_data:
  valkey_data:

networks:
  renderer_queue:
    internal: true
  renderer_egress:
