<!doctype html><html lang="ko"><head><meta charset="utf-8"><style>body{font:14px system-ui;width:340px;padding:14px}label{display:grid;gap:4px;margin:8px 0}input,textarea,button{font:inherit;padding:8px}textarea{min-height:100px}button{background:#185abc;color:white;border:0;border-radius:6px}p{color:#5f6b7a}</style></head><body><h1>선택한 페이지 분석</h1><p>공개 페이지에서 직접 선택한 텍스트만 전송합니다. 로그인 정보·쿠키·전체 HTML은 전송하지 않습니다.</p><label>Intent ID<input id="intent" autocomplete="off"></label><label>Capture token<input id="token" type="password" autocomplete="off"></label><label>선택 내용 미리보기<textarea id="preview" readonly></textarea></label><button id="capture">현재 선택 내용 확인</button><button id="send" disabled>검토 후 분석 요청</button><p id="status" role="status"></p><script src="popup.js"></script></body></html>
