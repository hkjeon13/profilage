<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Profilage | 인물 프로필</title>
    <link rel="stylesheet" href="/styles.css?v=person-profile-1" />
  </head>
  <body class="profile-body">
    <header class="top-nav"><nav class="top-nav-left"><a href="/">Profilage</a><a href="/">검색으로 돌아가기</a></nav></header>
    <main class="person-profile-page" data-person-profile-root aria-live="polite">
      <section class="person-profile-hero">
        <span class="entity-type-badge">인물</span>
        <h1 data-person-name>인물 프로필을 불러오는 중입니다</h1>
        <p data-person-subtitle></p>
        <div data-person-meta></div>
      </section>
      <section class="person-profile-section" aria-labelledby="person-summary-title">
        <h2 id="person-summary-title">AI 인물 요약</h2>
        <div data-person-summary>공개 근거를 바탕으로 요약을 준비하고 있습니다.</div>
      </section>
      <section class="person-profile-section" aria-labelledby="person-evidence-title">
        <h2 id="person-evidence-title">확인 근거</h2>
        <div data-person-evidence></div>
      </section>
      <section class="person-profile-section" aria-labelledby="person-sources-title">
        <h2 id="person-sources-title">출처</h2>
        <div data-person-sources></div>
      </section>
      <section class="person-profile-section person-rights-section" aria-labelledby="person-rights-title">
        <h2 id="person-rights-title">정보 정정·삭제 요청</h2>
        <p>잘못된 정보, 삭제 또는 검색 제외가 필요하면 요청을 남겨주세요.</p>
        <form data-person-rights-form><select name="kind"><option value="correction">정보 정정</option><option value="deletion">삭제 요청</option><option value="search_exclusion">검색 제외</option></select><textarea name="detail" required minlength="3" maxlength="1000"></textarea><button type="submit">요청 접수</button></form>
        <p data-person-rights-status role="status"></p>
      </section>
    </main>
    <script src="/person-page.js?v=person-profile-1" defer></script>
  </body>
</html>
