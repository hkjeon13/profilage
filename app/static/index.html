<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Profilage | 기업 데이터 검색</title>
    <link rel="stylesheet" href="/styles.css?v=google-home-12" />
  </head>
  <body class="is-idle google-like-home">
    <header class="top-nav" aria-label="상단 메뉴">
      <nav class="top-nav-left">
        <a href="/">Profilage 정보</a>
        <a href="/docs">API</a>
      </nav>
      <nav class="top-nav-right">
        <a href="/docs">문서</a>
        <a href="/openapi.json">OpenAPI</a>
      </nav>
    </header>

    <main class="shell">
      <section
        class="search-panel"
        aria-labelledby="page-title"
        data-outline-url="/api/company/get_corp_outline"
        data-profile-url="/profile?crno="
      >
        <div class="home-kicker">B2B 기업 데이터 플랫폼</div>
        <h1 id="page-title" class="home-title">기업 정보를 빠르게 찾고 비교하세요</h1>
        <p class="home-subtitle">
          금융위원회, DART, 주가 데이터를 기반으로 기업 개요·재무·공시·관계회사를 한 화면에서 확인합니다.
        </p>
        <form class="search-form" id="search-form">
          <label class="visually-hidden" for="company-query">기업명, 종목코드, 법인등록번호</label>
          <input
            id="company-query"
            name="company-query"
            type="search"
            autocomplete="off"
            placeholder="기업명, 종목코드, 법인등록번호로 검색"
            minlength="1"
          />
          <button class="search-submit" type="submit" aria-label="검색">
            <svg
              class="search-submit-icon"
              viewBox="0 0 24 24"
              aria-hidden="true"
              focusable="false"
            >
              <circle cx="11" cy="11" r="7"></circle>
              <path d="m16.5 16.5 4 4"></path>
            </svg>
            <span class="visually-hidden">검색</span>
          </button>
        </form>
        <div class="example-query-list" aria-label="예시 기업">
          <button type="button" data-example-query="삼성전자">삼성전자</button>
          <button type="button" data-example-query="LG전자">LG전자</button>
          <button type="button" data-example-query="롯데이노베이트">롯데이노베이트</button>
          <button type="button" data-example-query="카카오">카카오</button>
          <button type="button" data-example-query="현대자동차">현대자동차</button>
        </div>
        <div class="source-rail" data-source-rail aria-label="데이터 출처">
          <span>금융위원회 기업기본정보</span>
          <span>DART 공시/재무</span>
          <span>SearchAPI Google Finance</span>
          <span>OpenAI 요약</span>
        </div>
        <p class="status" id="search-status" role="status"></p>
      </section>

      <section class="content-grid" aria-live="polite">
        <aside class="result-list" id="result-list" aria-label="검색 결과"></aside>
      </section>
    </main>

    <footer class="page-footer">
      <div>대한민국</div>
      <nav aria-label="하단 메뉴">
        <a href="/docs">API 문서</a>
        <a href="/company/get_corp_outline?company_name=삼성전자">예시 조회</a>
        <a href="/docs">개발자</a>
      </nav>
    </footer>
    <script src="/app.js?v=google-home-12" defer></script>
  </body>
</html>
