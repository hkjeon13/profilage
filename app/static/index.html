<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Profilage | 기업·인물 데이터 검색</title>
    <link rel="stylesheet" href="/styles.css?v=person-search-layout-5" />
  </head>
  <body class="is-idle google-like-home">
    <header class="top-nav" aria-label="상단 메뉴">
      <nav class="top-nav-left">
        <a href="/" aria-current="page">Profilage</a>
        <a href="/compare" data-compare-nav>비교 <span class="compare-nav-count" data-compare-nav-count hidden></span></a>
      </nav>
      <nav class="top-nav-right">
        <a href="/?q=삼성전자">삼성전자 예시</a>
      </nav>
    </header>
    <main class="shell">
      <section
        class="search-panel"
        aria-labelledby="page-title"
        data-outline-url="/api/company/get_corp_outline"
        data-profile-url="/profile?crno="
      >
        <h1 id="page-title" class="home-title">기업과 인물을 더 빠르게 탐색하세요</h1>
        <p class="home-subtitle">
          검증된 기업 데이터와 공개 출처를 한곳에서 검색하세요.<br />
          비교와 분석에 필요한 정보를 매일 더 선명하게 연결합니다.
        </p>
        <form class="search-form" id="search-form" aria-describedby="search-status">
          <span class="search-leading-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <circle cx="11" cy="11" r="7"></circle>
              <path d="m16.5 16.5 4 4"></path>
            </svg>
          </span>
          <label class="visually-hidden" for="company-query">기업·인물 통합검색</label>
          <input
            id="company-query"
            name="company-query"
            type="search"
            autocomplete="off"
            placeholder="기업명, 인물명, 종목코드로 통합검색"
            minlength="1"
          />
          <button class="search-submit" type="submit">검색</button>
        </form>
        <p class="home-search-assistant">기업 결과가 없으면 공개 인물 후보까지 자동으로 찾아드립니다.</p>
        <p class="person-search-help" data-person-search-help hidden>
          공개 출처의 후보를 보여드립니다. 동명이인은 소속·직책과 원문을 확인해 주세요. 인물 검색어는 최근 검색이나 URL에 저장하지 않습니다.
        </p>
        <div class="recent-query-list" data-recent-query-list aria-label="최근 검색"></div>
        <div class="home-filter-row example-query-list" aria-label="추천 검색어">
          <button type="button" data-example-query="삼성전자">삼성전자</button>
          <button type="button" data-example-query="LG전자">LG전자</button>
          <button type="button" data-example-query="현대자동차">현대자동차</button>
          <button type="button" data-example-query="류재철 LG전자 대표">류재철</button>
          <button type="button" data-example-query="젠슨 황 NVIDIA CEO">젠슨 황</button>
          <button type="button" data-example-query="일론 머스크 Tesla CEO">일론 머스크</button>
        </div>
        <p class="status" id="search-status" role="status"></p>
      </section>

      <section class="content-grid" aria-labelledby="search-results-title">
        <h2 class="visually-hidden" id="search-results-title">검색 결과</h2>
        <div class="result-list" id="result-list"></div>
      </section>

    </main>

    <footer class="page-footer">
      <div>대한민국</div>
      <nav aria-label="하단 메뉴">
        <a href="/?q=삼성전자">삼성전자 예시</a>
        <a href="/compare" data-compare-nav>비교 <span class="compare-nav-count" data-compare-nav-count hidden></span></a>
      </nav>
    </footer>
    <script src="/app.js?v=unified-search-5" defer></script>
  </body>
</html>
