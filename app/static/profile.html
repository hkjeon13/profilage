<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>기업 프로필 | Profilage</title>
    <link rel="stylesheet" href="/styles.css?v=company-profile-72" />
    <link rel="stylesheet" href="/profile-chart-2.css?v=interactive-10" />
  </head>
  <body class="profile-page">
    <div class="company-background" aria-hidden="true"></div>
    <div class="company-canvas">
      <header class="top-nav" aria-label="상단 메뉴">
        <nav class="top-nav-left">
          <a class="brand-mark" href="/">Profilage</a>
          <a href="/">검색</a>
        </nav>
      </header>

      <main class="profile-shell">
        <a class="back-link" href="/">
          <span class="back-link-icon" aria-hidden="true">←</span>
          <span>검색결과로 돌아가기</span>
        </a>

        <section class="profile-top-grid" aria-label="기업 핵심 정보">
          <section
            class="profile-hero company-profile-card"
            aria-labelledby="profile-title"
            data-info-url="/api/company/get_company_info"
            data-stock-url="/api/company/get_stock_price"
          >
            <div class="profile-identity-row">
              <div class="company-logo-box" aria-hidden="true">P</div>
              <div class="profile-title-block">
                <h1 id="profile-title">기업 정보를 불러오는 중입니다</h1>
                <p id="profile-subtitle">법인등록번호를 기준으로 공공데이터, KRX, 주가 정보를 연결합니다.</p>
              </div>
            </div>
            <div class="profile-hero-badges" aria-hidden="true">
              <span>공개 데이터</span>
              <span>Profilage</span>
            </div>
            <div class="profile-rating-card" aria-label="Profilage 기업평가">
              <span>Profilage 기업평가</span>
              <strong>DATA</strong>
              <p>공개 데이터와 DART 기반으로 기업 정보를 연결합니다.</p>
            </div>
          </section>

          <aside class="profile-basic-card" id="profile-basic-card" aria-label="기업 기본정보">
            <div class="profile-basic-placeholder">기업 기본정보를 불러오는 중입니다.</div>
          </aside>
        </section>

        <section class="profile-layout">
          <section class="detail-panel" id="profile-detail" aria-label="기업 상세">
            <div class="empty-state">
              <span class="empty-kicker">Loading</span>
              <p>기업 프로필을 불러오는 중입니다.</p>
            </div>
          </section>
        </section>
      </main>
    </div>

    <script src="/profile-page-5.js?v=company-profile-58" defer></script>
  </body>
</html>
